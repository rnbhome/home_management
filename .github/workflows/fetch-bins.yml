name: Refresh bin collection dates

on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-bins.yml'
      - 'scripts/fetch-bins.py'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and merge collections
        env:
          BIN_UPRN: '200004201521'
        run: python3 scripts/fetch-bins.py
      - name: Commit if changed
        run: |
          if git diff --quiet -- data/state.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "Refresh bin collection dates"
          git push
